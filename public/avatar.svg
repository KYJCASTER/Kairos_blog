<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F7931E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD23F;stop-opacity:1" />
    </linearGradient>
    
    <!-- 发光效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 阴影 -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#FF6B35" flood-opacity="0.3"/>
    </filter>
    
    <!-- 圆形裁剪 -->
    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="180"/>
    </clipPath>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="200" cy="200" r="190" fill="url(#bgGrad)"/>
  
  <!-- 装饰网格线 -->
  <g clip-path="url(#circleClip)" opacity="0.15">
    <line x1="0" y1="100" x2="400" y2="100" stroke="white" stroke-width="2"/>
    <line x1="0" y1="200" x2="400" y2="200" stroke="white" stroke-width="2"/>
    <line x1="0" y1="300" x2="400" y2="300" stroke="white" stroke-width="2"/>
    <line x1="100" y1="0" x2="100" y2="400" stroke="white" stroke-width="2"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="white" stroke-width="2"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- 装饰圆环 -->
  <circle cx="200" cy="200" r="170" fill="none" stroke="white" stroke-width="3" opacity="0.3"/>
  <circle cx="200" cy="200" r="150" fill="none" stroke="white" stroke-width="1" opacity="0.2"/>
  
  <!-- 装饰六边形 -->
  <g transform="translate(200, 200)" opacity="0.1">
    <polygon points="0,-120 104,-60 104,60 0,120 -104,60 -104,-60" fill="none" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- 主圆形背景 -->
  <circle cx="200" cy="200" r="130" fill="white" filter="url(#shadow)"/>
  
  <!-- K 字母 -->
  <text x="200" y="245" 
        font-family="Arial, sans-serif" 
        font-size="140" 
        font-weight="900" 
        fill="url(#bgGrad)" 
        text-anchor="middle"
        filter="url(#glow)">K</text>
  
  <!-- 装饰小点 -->
  <circle cx="80" cy="100" r="6" fill="white" opacity="0.6"/>
  <circle cx="320" cy="120" r="4" fill="white" opacity="0.4"/>
  <circle cx="340" cy="280" r="8" fill="white" opacity="0.5"/>
  <circle cx="70" cy="300" r="5" fill="white" opacity="0.3"/>
  
  <!-- 四角星星装饰 -->
  <g transform="translate(100, 80)" opacity="0.4">
    <path d="M0,-10 L2,-2 L10,0 L2,2 L0,10 L-2,2 L-10,0 L-2,-2 Z" fill="white"/>
  </g>
  <g transform="translate(310, 320)" opacity="0.3">
    <path d="M0,-8 L1.5,-1.5 L8,0 L1.5,1.5 L0,8 L-1.5,1.5 L-8,0 L-1.5,-1.5 Z" fill="white"/>
  </g>
  
  <!-- 弧线装饰 -->
  <path d="M 60,200 Q 60,120 130,100" fill="none" stroke="white" stroke-width="2" opacity="0.2" stroke-linecap="round"/>
  <path d="M 340,200 Q 340,280 270,300" fill="none" stroke="white" stroke-width="2" opacity="0.2" stroke-linecap="round"/>
</svg>